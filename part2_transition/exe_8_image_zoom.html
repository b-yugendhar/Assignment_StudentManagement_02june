<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:#f0f0f0;
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            padding:20px;
            text-align:center;
            background-color:#d6c9c9;
        }
        .zoom-image{
            width:300px;
            height:auto;
            border:#241c1c solid 5px;
            transition:transform 0.3s ease;
            cursor:pointer;
        }
        .zoom-image:hover{
            transform:scale(1.2);
        }
    </style>
</head>
<body>
    <!--Image Zoom Effect-->
    <img src="https://cdn.pixabay.com/photo/2024/12/28/01/27/ai-generated-9295105_640.jpg" alt="Zoom Image" class="zoom-image">

</body>
</html>
