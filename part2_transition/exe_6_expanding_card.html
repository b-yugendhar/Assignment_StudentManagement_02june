<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:#f0f0f0;
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            padding:20px;
            text-align:center;
            background-color:#d6c9c9;
        }
        .student-card{
            background-color:white;
            width:200px;
            height:200px;
            margin:20px auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(17, 17, 17, 0.1);
            transition:all 0.3s;

        }
        .student-card:hover{
            box-shadow:0 0 15px rgba(17, 17, 17, 0.2);
            width: 300px;
            height:300px;
        }
        .profile-image{
            width:100px;
            height:100px;
            border-radius:50%;
            margin-bottom:15px;
            border:2px solid #6682a7;
        }
        .student-info h2{
            color:#6682a7;
            margin-bottom:1px;

        }
        
    </style>
</head>
<body>
    <h1>Student Card</h1>
    <div class="student-card">
        <img src="https://i.pinimg.com/736x/0e/1b/49/0e1b4984c22ff810051677b8c7a29e7d.jpg" alt="Profile Image" class="profile-image">
        <div class="student-info">
        <h3>Yugendhar</h3>
      
        </div>
    </div>
</body>
</html>
