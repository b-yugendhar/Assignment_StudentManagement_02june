<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:#f0f0f0;
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            padding:20px;
            text-align:center;
            background-color:#d6c9c9;
        }
        .animated-button{
            background-color:#6682a7;
            color:white;
            border:none;
            padding:10px 20px;
            font-size:18px;
            cursor:pointer;
            border-radius:5px;
        }
        .animated-button:hover{
            background-color:rgb(50, 158, 65);
            color:#0e1011;
            transition:all 0.3s;
        }
    </style>
</head>
<body>
    <button class="animated-button">Hover Me</button>
</body>
</html>
