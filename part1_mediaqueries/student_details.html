<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:#f0f0f0;
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            padding:20px;
            text-align:center;
            background-color:#d6c9c9;
        }
        .student-card{
            background-color:white;
            width:300px;
            margin:20px auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(17, 17, 17, 0.1);
        }
        .profile-image{
            width:100px;
                height:100px;
                border-radius:50%;
                border-shadow:0 0 10px rgba(8, 8, 8, 0.1);
        }
              
        @media (min-width:769px){
            .student-card{
                display:grid;
                grid-template-columns:150px 1fr;
                text-align:left;

            }
            .profile-image{
                margin-right:20px;
            }
        }

        @media (max-width:768px){
            .student-card{
                display:grid;
                grid-template-columns:  1fr;
            }
            .profile-image{
                margin:0 auto 15px;
            }
        }
    </style>
</head>
