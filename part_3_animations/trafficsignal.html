<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:#f0f0f0;
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            padding:20px;
            text-align:center;
            background-color:#d6c9c9;
        }
        .traffic-signal {
            width: 100px;
            height: 260px;
            background-color: #333;
            border-radius: 20px;
            margin: 50px auto;
            padding: 20px 0;
        }

        .light {
            width: 60px;
            height: 60px;
            background-color: #555;
            border-radius: 50%;
            margin: 10px auto;
        }

        .red {
            animation: redLight 6s infinite;
        }

        .yellow {
            animation: yellowLight 6s infinite;
        }

        .green {
            animation: greenLight 6s infinite;
        }

        @keyframes redLight {
            0%, 33% { background-color: red; }
            34%, 100% { background-color: #555; }
        }

        @keyframes yellowLight {
            0%, 33% { background-color: #555; }
            34%, 66% { background-color: yellow; }
            67%, 100% { background-color: #555; }
        }

        @keyframes greenLight {
            0%, 66% { background-color: #555; }
            67%, 100% { background-color: green; }
        }
        </style>
</head>
<body>
    <div class="traffic-signal">    
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
    </div>
    
</body>
</html>
